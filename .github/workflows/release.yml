# ⚠️ 这份文件要放到 public 分发仓 jinhe-storyboard-releases 的
#    .github/workflows/release.yml （不是本 private 仓）。
#
# 方案 B：private 源码仓打 tag → repository_dispatch 触发本 workflow →
#         checkout private 源码（用 SOURCE_PAT）→ 三平台打包 → 发本仓（public）Release。
# public 仓的 GitHub Actions 免费无限（含 macOS，无 10× 额度）。
#
# 需在 public 仓 Settings → Secrets 配：
#   SOURCE_PAT = 对 private 仓 jinhe-storyboard 有 contents:read 的 PAT
name: Release

on:
  repository_dispatch:
    types: [do-release]

permissions:
  contents: write   # 发本仓（public）Release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout private 源码 @tag
        uses: actions/checkout@v4
        with:
          repository: JinHe9527/jinhe-storyboard
          ref: ${{ github.event.client_payload.tag }}
          token: ${{ secrets.SOURCE_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build frontend
        run: bun run build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # public CI 发本仓 Release，内置 token 即可
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run dist:ci
