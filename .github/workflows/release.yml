name: Release

on:
  repository_dispatch:
    types: [do-release]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout private 源码 @tag
        uses: actions/checkout@v4
        with:
          repository: JinHe9527/jinhe-storyboard
          ref: ${{ github.event.client_payload.tag }}
          token: ${{ secrets.SOURCE_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd cloud && bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build frontend
        run: bun run build

      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run dist:ci
